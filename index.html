<!DOCTYPE html>

<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rebuild Strong">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="data:application/json,{%22name%22:%22Rebuild+Strong%22,%22short_name%22:%22RS%22,%22start_url%22:%22./%22,%22display%22:%22standalone%22,%22background_color%22:%22%23080808%22,%22theme_color%22:%22%23080808%22,%22orientation%22:%22portrait%22}">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Crect width='120' height='120' fill='%230a0a0a'/%3E%3Ctext x='12' y='72' font-family='system-ui' font-weight='900' font-size='52' fill='%23b8ff35'%3ERS%3C/text%3E%3C/svg%3E">
<title>Rebuild Strong</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--s1:#131313;--s2:#1a1a1a;--brd:#1e1e1e;--brd2:#282828;
  --lime:#b8ff35;--orange:#ff6b35;--blue:#4dabf7;--green:#51cf66;
  --purple:#cc5de8;--red:#ff4757;--yellow:#ffd43b;--pink:#ff2d55;
  --text:#ffffff;--muted:#6b6b6b;--dim:#2a2a2a;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
html{height:100%;height:-webkit-fill-available}
body{
  min-height:100vh;
  min-height:-webkit-fill-available;
  min-height:100dvh;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:"Helvetica Neue",Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
/* Desktop: centre & constrain to phone width */
@media(min-width:600px){
  body{display:flex;justify-content:center;align-items:flex-start;background:#060606}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(45deg,#0d0d0d 0,#0d0d0d 1px,transparent 0,transparent 50%) 0 0/30px 30px;z-index:-1}
  #app-shell{
    width:390px;
    height:100vh;
    height:100dvh;
    position:relative;
    overflow:hidden;
    border-radius:0;
    box-shadow:0 0 0 1px #222,0 32px 80px rgba(0,0,0,.8);
  }
}
@media(min-width:600px) and (min-height:700px){
  body{align-items:center}
  #app-shell{height:min(850px,100vh);height:min(850px,100dvh);border-radius:40px}
}
#app-shell{width:100%;height:100vh;height:100dvh;overflow:hidden;position:relative;display:flex;flex-direction:column;background:var(--bg)}
.view{display:none;height:100%;flex-direction:column;position:absolute;inset:0;background:var(--bg)}
.view.on{display:flex}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.scroll::-webkit-scrollbar{display:none}

.hero{padding:calc(var(--sat)+22px) 16px 16px;background:linear-gradient(180deg,rgba(184,255,53,.07)0%,transparent 100%);border-bottom:1px solid rgba(184,255,53,.1)}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:62px;font-weight:400;line-height:.9;margin-bottom:12px;letter-spacing:3px;text-transform:uppercase;text-rendering:optimizeLegibility}
.hero h1 em{color:#b8ff35;font-style:normal}
.pills{display:flex;gap:5px;flex-wrap:wrap}
.pill{font-size:9px;padding:3px 9px;background:var(--s2);border:1px solid var(--brd2);border-radius:20px;color:var(--muted)}
.pill b{color:var(--text)}
.phase-lbl{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:14px 16px 6px;font-family:monospace}
.wcard{background:var(--s1);margin:0 12px 6px;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.wcard:active{opacity:.65;transform:scale(.98)}
.wcard{transition:opacity .15s,transform .15s}
.dcard{transition:opacity .15s,transform .15s}
.dcard:active{opacity:.65;transform:scale(.99)}
.wnum{font-size:22px;font-weight:800;width:36px;flex-shrink:0;line-height:1}
.winfo{flex:1;min-width:0}
.wfocus{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.wbadges{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.badge{font-size:8px;padding:1px 6px;border-radius:7px;font-weight:700}
.dots{display:flex;gap:2px}
.dot{width:14px;height:3px;border-radius:2px;background:var(--brd2)}
.dot.on{background:var(--lime)}
.tb{padding:calc(var(--sat)+10px) 14px 10px;border-bottom:1px solid var(--brd);display:flex;align-items:flex-end;flex-shrink:0;background:var(--bg)}
.btn-back{background:none;border:none;color:var(--lime);font-size:14px;font-weight:600;cursor:pointer;padding:4px 0}
.tb-center{flex:1;text-align:center;font-size:12px;color:var(--muted)}
.week-hero{padding:14px;border-bottom:1px solid var(--brd);flex-shrink:0}
.week-phase{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-family:monospace;margin-bottom:4px}
.week-title{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.week-focus{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:8px}
.dcard{background:var(--s1);margin:0 12px 7px;border-radius:12px;padding:13px 15px;cursor:pointer}
.dcard:active{opacity:.65}
.dcard-top{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.ddot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dname{font-weight:600;font-size:14px;flex:1}
.ddur{font-size:11px;color:var(--muted)}
.dtype{font-size:8px;padding:2px 8px;border-radius:7px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;display:inline-block}
.dcard.opt{border:1px dashed var(--brd2);background:transparent}
.opt-lbl{font-size:9px;color:var(--muted);font-style:italic;margin-bottom:4px}
.sess-hero{padding:14px;border-bottom:1px solid var(--brd);flex-shrink:0}
.sess-type{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-family:monospace;margin-bottom:4px}
.sess-title{font-size:17px;font-weight:700;line-height:1.2;margin-bottom:8px}
.smeta{display:flex;gap:6px;flex-wrap:wrap}
.stag{font-size:10px;padding:3px 9px;border-radius:8px;background:var(--s2);color:var(--muted)}
.timing-bar{display:flex;gap:3px;margin-top:10px;flex-wrap:wrap}
.tblock{font-size:8px;padding:3px 7px;border-radius:4px;font-family:monospace;font-weight:700;white-space:nowrap}
.content{padding:12px;display:flex;flex-direction:column;gap:8px;padding-bottom:calc(var(--sab)+90px)}
.blk{background:var(--s1);border-radius:10px;overflow:hidden}
.blk-l{padding:8px 13px 6px;font-size:8px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--brd);font-family:monospace;display:flex;align-items:center;gap:6px;justify-content:space-between;background:rgba(255,255,255,.02)}
.blk-ltext{display:flex;align-items:center;gap:6px}
.blk-dur{font-size:8px;color:var(--lime);font-family:monospace;opacity:.7;flex-shrink:0}
.blk-badge{font-size:7px;padding:1px 5px;border-radius:4px;font-weight:700;flex-shrink:0}
.blk-lines{padding:10px 13px;display:flex;flex-direction:column;gap:5px}
.lrow{font-size:13px;color:var(--text);line-height:1.5}
.ltags{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.ltag{font-size:9px;padding:2px 7px;border-radius:5px;font-weight:700;font-family:monospace}
.ltag.kg{background:rgba(184,255,53,.15);color:var(--lime)}
.ltag.rpe{background:rgba(255,107,53,.15);color:var(--orange)}
.ltag.tmp{background:rgba(77,171,247,.15);color:var(--blue)}
.blk-note{padding:7px 13px;font-size:11px;color:var(--muted);font-style:italic;border-top:1px solid var(--brd);line-height:1.5}
.yt-row{padding:6px 13px;border-top:1px solid var(--brd)}
.yt-link{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#ff4444;text-decoration:none;padding:3px 8px;background:rgba(255,0,0,.1);border-radius:5px;font-family:monospace;font-weight:700}
.mob{border:1px solid rgba(184,255,53,.18);border-radius:10px;overflow:hidden}
.mob-hdr{padding:10px 13px;background:rgba(184,255,53,.04);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.mob-htitle{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(184,255,53,.6);font-family:monospace;margin-bottom:2px}
.mob-focus{font-size:11px;color:var(--muted)}
.mob-arr{color:var(--lime);font-size:20px;transition:transform .2s}
.mob-arr.open{transform:rotate(180deg)}
.mob-body{display:none}
.mob-body.on{display:block}
.mob-ex{padding:9px 13px;border-top:1px solid var(--brd);display:flex;flex-direction:column;gap:4px}
.mob-ex-hdr{display:flex;gap:10px}
.mob-ex-l{flex-shrink:0;width:86px}
.mob-ex-d{font-size:9px;font-weight:700;color:var(--lime);font-family:monospace;text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
.mob-ex-n{font-size:12px;font-weight:600;color:var(--text);line-height:1.3}
.mob-ex-t{font-size:12px;color:var(--muted);line-height:1.6;flex:1}
.mob-foot{padding:7px 13px;font-size:10px;color:var(--dim);font-style:italic;border-top:1px solid var(--brd)}
.fab{position:absolute;bottom:calc(18px + var(--sab));right:14px;width:52px;height:52px;background:var(--lime);border-radius:50%;border:none;cursor:pointer;font-size:22px;box-shadow:0 4px 20px rgba(184,255,53,.4);z-index:50;display:none;align-items:center;justify-content:center}
.fab.on{display:flex}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:100;display:none;align-items:flex-end}
.overlay.on{display:flex}
.sheet{background:var(--s1);border-radius:20px 20px 0 0;width:100%;max-height:80%;display:flex;flex-direction:column}
.sh-handle{width:36px;height:4px;background:var(--brd2);border-radius:2px;margin:12px auto 0}
.sh-hdr{padding:14px 18px 10px;border-bottom:1px solid var(--brd)}
.sh-title{font-size:17px;font-weight:700}
.sh-sub{font-size:12px;color:var(--muted);margin-top:2px}
.sh-body{flex:1;overflow-y:auto;padding:14px}
.exp-txt{font-size:11px;font-family:monospace;color:var(--muted);white-space:pre-wrap;line-height:1.6;background:var(--s2);padding:12px;border-radius:8px;border:1px solid var(--brd);width:100%}
.sh-btns{display:flex;gap:8px;padding:12px 16px;padding-bottom:calc(12px + var(--sab));border-top:1px solid var(--brd)}
.btn-copy{flex:1;padding:13px;background:var(--lime);color:#000;font-size:15px;font-weight:700;border:none;border-radius:12px;cursor:pointer}
.btn-copy.done{background:var(--green)}
.btn-close{padding:13px 16px;background:var(--s2);color:var(--text);font-size:15px;border:none;border-radius:12px;cursor:pointer}
.sp{height:24px}
</style>

</head>
<body>

<div id="app-shell">
<div id="home" class="view on">
  <div class="scroll">
    <div class="hero">
      <h1>REBUILD<br><em>STRONG</em></h1>
      <div class="pills">
        <div class="pill"><b>16</b> semanas · Fase 2</div>
        <div class="pill">DUP <b>Advanced</b></div>
        <div class="pill">5+1 días</div>
        <div class="pill">v6 · timing corregido</div>
      </div>
    </div>
    <div id="home-list"></div>
    <div class="sp"></div>
  </div>
</div>

<div id="week-view" class="view">
  <div class="tb"><button class="btn-back" onclick="goHome()">‹ Programa</button><div class="tb-center" id="week-tb"></div></div>
  <div id="week-hero" class="week-hero"></div>
  <div class="scroll"><div id="week-days" style="padding:10px 0"></div><div class="sp"></div></div>
</div>

<div id="sess-view" class="view">
  <div class="tb">
    <button class="btn-back" id="sess-back">‹</button>
    <div class="tb-center" id="sess-tb"></div>
    <div style="width:60px"></div>
  </div>
  <div id="sess-hero" class="sess-hero"></div>
  <div class="scroll"><div id="sess-content" class="content"></div></div>
</div>

<button class="fab" id="fab" onclick="openExport()">↑</button>

<div class="overlay" id="overlay" onclick="overlayTap(event)">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-hdr">
      <div class="sh-title">Exportar para BTWB</div>
      <div class="sh-sub" id="exp-sub"></div>
    </div>
    <div class="sh-body"><pre class="exp-txt" id="exp-txt"></pre></div>
    <div class="sh-btns">
      <button class="btn-copy" id="btn-copy" onclick="doCopy()">Copiar para BTWB</button>
      <button class="btn-close" onclick="closeExport()">Cerrar</button>
    </div>
  </div>
</div>

<script>
const PC=p=>["#4dabf7","#51cf66","#ff6b35","#b8ff35"][p-1]||"#b8ff35";
const RM={bs:145,fs:125,dl:175,bench:125,press:75,cj:105,snatch:75,prow:100};
const KG=(l,p)=>Math.round(RM[l]*p/100);

const YT={
  "Back Squat":"https://youtu.be/bEv6CCg2BC8",
  "Front Squat":"https://youtu.be/uYumuL_G_V0",
  "Deadlift":"https://youtu.be/op9kVnSso6Q",
  "Bench Press":"https://youtu.be/rT7DgCr-3pg",
  "Strict Press":"https://youtu.be/2yjwXTZQDDI",
  "Clean & Jerk":"https://youtu.be/wbBjMT93Kn0",
  "Snatch":"https://youtu.be/tuOiNeTvLJs",
  "Weighted Pull-ups":"https://youtu.be/lU9eTBnCqR4",
  "Pendlay Row":"https://youtu.be/VOdriXnxNhE",
  "HSPU":"https://youtu.be/Z5cJBOPxnJY",
  "Log Clean & Press":"https://youtu.be/lXH1GZJKP3U",
  "Yoke Walk":"https://youtu.be/7YrxZzaFqNE",
  "Atlas Stone":"https://youtu.be/5LhijKxWxPM",
  "Axle Bar Deadlift":"https://youtu.be/0Gu_cwEJxpA",
  "Husafell Stone":"https://youtu.be/JNq0BHgRNf0",
  "Tire Flip":"https://youtu.be/JNq0BHgRNf0",
  "Couch Stretch":"https://youtu.be/CDiMivUHIBU",
};

const WEEKS=[
  {w:1,p:1,pn:"Acumulación Base",focus:"DUP + GPP + Strongman introducidos · Timing ajustado",int:1,dl:false,ts:false},
  {w:2,p:1,pn:"Acumulación Base",focus:"Semana par · Front Squat lidera D1 · WOD CrossFit customizado",int:2,dl:false,ts:false},
  {w:3,p:1,pn:"Acumulación Base",focus:"Pico Fase 1 · Pendlay Row progresa · Log Press Strongman",int:3,dl:false,ts:false},
  {w:4,p:1,pn:"Acumulación Base",focus:"DELOAD · Volumen −40% · SNC se recupera",int:1,dl:true,ts:false},
  {w:5,p:2,pn:"Acumulación Pesada",focus:"Cargas 78–87% · Yoke Walk · WOD técnico",int:2,dl:false,ts:false},
  {w:6,p:2,pn:"Acumulación Pesada",focus:"Cargas 80–85% · Atlas Stone · BB clusters",int:3,dl:false,ts:false},
  {w:7,p:2,pn:"Acumulación Pesada",focus:"Pico Fase 2 · Axle Bar DL · WOD chipper",int:4,dl:false,ts:false},
  {w:8,p:2,pn:"Acumulación Pesada",focus:"DELOAD · Volumen −40% · Carga se mantiene",int:1,dl:true,ts:false},
  {w:9,p:3,pn:"Intensificación",focus:"Cargas 85–92% · Husafell Stone · WOD pesado",int:3,dl:false,ts:false},
  {w:10,p:3,pn:"Intensificación",focus:"Top sets 88–92% · Log Press max · WOD gymnástica",int:4,dl:false,ts:false},
  {w:11,p:3,pn:"Intensificación",focus:"Pico absoluto · Tire Flip · WOD AMRAP intenso",int:5,dl:false,ts:false},
  {w:12,p:3,pn:"Intensificación",focus:"DELOAD PARCIAL · Volumen −25% · Prep para Peak",int:1,dl:true,ts:false},
  {w:13,p:4,pn:"Peak & Realización",focus:"Tapering · Yoke Walk pesado · WOD corto y agudo",int:3,dl:false,ts:false},
  {w:14,p:4,pn:"Peak & Realización",focus:"Tapering final · Farmer's Carry PR · WOD técnico",int:3,dl:false,ts:false},
  {w:15,p:4,pn:"Peak & Realización",focus:"⭐ TESTING — 1RM todos los levantamientos",int:5,dl:false,ts:true},
  {w:16,p:4,pn:"Peak & Realización",focus:"DELOAD FINAL · Test Cooper · Medición FCreposo",int:1,dl:true,ts:false},
];

// Per-week data — now Z2 on D2 is 20 min max
// [bs_p,fs_p,dl_p,bp_pot,sp_pot,sn_p,cj_p,wpull,z2_d2,run_d3,vo2r,prow_p,vo2pct]
const WD=[
  [82,83,66,62,64,74,73,22,20,30,4,65,"85–87"],
  [83,83,68,64,66,75,75,24,20,32,4,67,"86–88"],
  [85,85,70,66,68,77,77,26,20,34,4,69,"87–89"],
  [83,83,68,64,66,72,73,22,18,22,3,65,"85"],
  [78,78,70,63,67,78,78,26,20,36,4,67,"88"],
  [80,80,72,65,69,80,80,28,20,37,4,68,"89"],
  [83,83,76,67,71,83,83,30,20,38,4,70,"90"],
  [78,78,70,63,65,74,74,24,18,22,3,65,"87"],
  [86,86,76,66,72,85,85,32,20,38,3,70,"90"],
  [88,88,78,68,74,88,88,34,20,40,3,72,"91"],
  [91,91,82,70,76,91,91,36,20,42,3,74,"92"],
  [83,83,74,64,68,78,78,28,18,25,3,68,"87"],
  [90,90,87,66,72,88,88,38,20,38,3,72,"89"],
  [93,93,91,66,72,92,92,40,18,35,3,74,"87"],
  [100,100,100,66,72,100,100,52,15,28,0,72,"—"],
  [62,62,62,60,60,68,68,0,15,25,0,60,"Cooper"],
];

// Real Strongman events — 16 different ones, one per week
const STRONGMAN=[
  {name:"Log Clean & Press",yt:"Log Clean & Press",
   desc:"5×3 singles — clean desde el suelo al pecho, press overhead",
   load:"50–60 kg (log o axle bar). Sin log: BB con agarre ancho.",
   detail:"El log press activa el core y los oblicuos de forma única. El clean del log exige una cadera más potente que el clean olímpico.",
   timing:"15 min incluido calentamiento específico"},
  {name:"Yoke Walk",yt:"Yoke Walk",
   desc:"4×20m con yoke @ 150% del peso corporal",
   load:"~140 kg (sin yoke: barbell en espalda alta + sandbag al pecho simulado)",
   detail:"No es un paseo. Es control total bajo carga extrema. Core maximal, no doblar la espalda.",
   timing:"15 min — setup + 4 series + descanso 2 min"},
  {name:"Atlas Stone to Shoulder",yt:"Atlas Stone",
   desc:"5 cargas a plataforma @ 1m de altura — sandbag 60–70 kg",
   load:"Sandbag 60–70 kg al hombro. Sin stone: saco de arena o dummy.",
   detail:"Lap (muslos) → extensión explosiva → carga al hombro. Es un movimiento completo, no un clean.",
   timing:"15 min incluido práctica técnica"},
  {name:"Axle Bar Deadlift",yt:"Axle Bar Deadlift",
   desc:"5×2 @ 85% del DL regular — barra gruesa, doble overhand",
   load:`~${Math.round(175*0.85)} kg. Sin axle: toalla enrollada en barra estándar`,
   detail:"El grip es el reto. Sin straps. La barra gruesa trabaja el antebrazo y el nervio cubital de forma que la barra estándar no puede.",
   timing:"15 min con rampa incluida"},
  {name:"Husafell Stone Carry",yt:"Husafell Stone",
   desc:"3×AMRAP distancia — sandbag 50–60 kg en posición Husafell (horizontal contra pecho)",
   load:"Sandbag 50–60 kg. La posición correcta es horizontal, no vertical.",
   detail:"Diferente al bearhug: el stone Husafell va horizontal cruzando el abdomen. Fuerza del core que el gym no puede replicar.",
   timing:"15 min — 3 intentos con 3 min descanso"},
  {name:"Farmer's Carry + Yoke alternado",yt:"Yoke Walk",
   desc:"3 rounds: 20m Farmer's Carry @70 kg/mano → 20m Yoke @130 kg → descanso 90 seg",
   load:"Farmer: 70 kg/mano. Yoke: 130 kg o barbell en espalda.",
   detail:"Circuito de carga gruesa: alterna el patrón de agarre cerrado (farmer) con el de soporte en trapecios (yoke). Evento real en competición.",
   timing:"15 min — 3 rounds completos"},
  {name:"Log Press for Max",yt:"Log Clean & Press",
   desc:"Trabaja hasta 1RM del día en el log press: rampa 5→3→2→1→1→1RM",
   load:"Empieza en 50 kg, sube de 5 en 5 hasta el máximo del día.",
   detail:"Semana de intensificación: el objetivo es un PR de log press. Sin ego — si el técnico falla, para.",

  const gpp=GPP[(w.w-1)%GPP.length];

      {t:`Rampa: ${isBack?"60×3→90×2→110×1":"50×3→80×2→100×1"}`},

      {t:`Back-off 1: 1×3 @ 90% del top`,kg:`~${Math.round(sqK*.9)} kg`},

      {t:`${d?4:6}×3 @ ${bp_pot}%`,kg:`~${KG("bench",bp_pot)} kg`,rpe:"RPE 6–7"},
      {t:"Tempo: 2-1-X-0 · Explosivo · 90 seg descanso",tmp:"2-1-X-0"},
    ],note:"Objetivo: máxima velocidad concéntrica. Si la barra va lenta, el peso es alto."},
    {l:"Strict Press · Potencia",dur:"8'",yt:"Strict Press",lines:[
      {t:`${d?3:5}×3 @ ${sp_pot}%`,kg:`~${KG("press",sp_pot)} kg`,rpe:"RPE 6"},
      {t:"Explosivo · pausa en lockout · 90 seg"},
    ]},
    {l:"Weighted Dips · Potencia",dur:"7'",lines:[
      {t:`${d?3:4}×5 @ +${WD[w.w-1][7]||15} kg`,kg:`+${WD[w.w-1][7]||15} kg`,rpe:"RPE 6–7"},
      {t:"Tempo: 2-1-X · 90 seg",tmp:"2-1-X"},
    ]},
    ...(!d?[{l:bb.name,dur:bb.time,cls:"bb",badge:"BB",lines:bb.ex.map(e=>({t:e})),note:"Máx 10 min. Sin alargar la sesión."}]:[]),
  ];
}

function getD3Blocks(w){
  const run=WD[w.w-1][9];
  const d=w.dl,t=w.ts;
  if(t) return [{l:`Carrera Z2 suave · ${run} min`,lines:[{t:`${run} min · FC 128–138 bpm`}]}];
  return [{
    l:`Carrera Z2 · ${run} min`,dur:`${run}'`,
    lines:[
      {t:d?"Trote/caminata Z1 suave":`${run} min corriendo @ Z2`},
      {t:`FC: ${d?"<125 bpm":"128–145 bpm"}`},
      ...(!d&&w.w<=4?[{t:"Ritmo ~6:20–7:00 min/km · ajusta para mantener la FC en Z2"}]:[]),
    ],
    note:d?"Deload cardíaco. Menos tiempo, menos intensidad.":(w.w===1?"No corras más rápido porque puedes. La FC manda.":null)
  }];
}

function getD4Blocks(w){
  const wd=WD[w.w-1];
  const [bs_p,fs_p,dl_p,,,,,wpull,,,,,prow_p]=wd;
  const d=w.dl,t=w.ts,isBack=w.w%2===1;
  const sm=STRONGMAN[w.w-1];
  if(t) return [
    {l:"Deadlift · 1RM",yt:"Deadlift",lines:[{t:"Target: 210 kg"}]},
    {l:"Pendlay Row · 1RM",yt:"Pendlay Row",lines:[{t:`Target: ~${KG("prow",100)} kg`}]},
    {l:"Clean & Jerk · 1RM",yt:"Clean & Jerk",lines:[{t:"Target: 115 kg"}]},
    {l:sm.name+" · Strongman Testing",yt:sm.yt,lines:[{t:sm.desc},{t:sm.load}],note:sm.detail},
  ];
  const dlK=KG("dl",dl_p);
  const pK=KG("prow",prow_p),pBO=Math.round(pK*.88);
  return [
    {l:"Calentamiento · 5 min",dur:"5'",lines:[{t:"2×10 KB swing 24 kg + 2×8 RDL 60 kg + movilidad cadera"}]},
    {l:"Deadlift · Hipertrofia",dur:"18'",yt:"Deadlift",lines:[
      {t:`${d?3:4}×${d?4:"5–6"} @ ${dl_p}%`,kg:`~${dlK} kg`,rpe:"RPE 7–8"},
      {t:"Tempo: 3-1-1-0 · Descanso: 2:30 min",tmp:"3-1-1-0"},
    ],note:"Objetivo: TUT. El excéntrico de 3 seg genera mayor estímulo de hipertrofia que el DL explosivo."},
    {l:"Pendlay Row · Fuerza",dur:"12'",yt:"Pendlay Row",lines:[
      {t:`Top Set: 1×${d?4:5} @ ${prow_p}%`,kg:`~${pK} kg`,rpe:d?"RPE 7":"RPE 8"},
      {t:`Back-off: ${d?1:2}×5 @ 88% del top`,kg:`~${pBO} kg`},
      {t:"Barra al suelo entre reps. Espalda plana. Explosivo en el pull."},
    ],note:"Trátalo como un levantamiento principal — no es un accesorio. Tiene Top Set y Back-off igual que el squat."},
    {l:"Weighted Pull-ups · Fuerza",dur:"10'",yt:"Weighted Pull-ups",lines:[
      {t:`${d?3:5}×${d?2:3} @ +${wpull} kg`,kg:`+${wpull} kg extra`,rpe:"RPE 8"},
      {t:"Estrictos · pausa 1 seg arriba · descenso 2 seg · 2:30 min descanso"},
    ]},
    ...(!d?[{l:sm.name,dur:sm.timing,cls:"sm",badge:"STRONGMAN",yt:sm.yt,
      lines:[{t:sm.desc},{t:`Carga: ${sm.load}`},{t:sm.detail}],
      note:"Evento real de Strongman. Aplica la misma mentalidad de técnica que en los olímpicos."}]:[]),
  ];
}

function getD5Blocks(w){
  const wd=WD[w.w-1];
  const [bs_p,fs_p,,,,sn_p,cj_p,,,run,vo2r,,vo2pct]=wd;
  const d=w.dl,t=w.ts,isBack=w.w%2===1;
  const d5oly=isBack?"Snatch":"C&J";
  const olyP=d5oly==="C&J"?cj_p:sn_p;
  const olyK=d5oly==="C&J"?KG("cj",cj_p):KG("snatch",sn_p);
  const bsP=Math.min(bs_p,93),bsK=KG("bench",bsP);
  const vo2t=vo2r>0?`${vo2r} rounds × (${Number(vo2pct)>=90?"4":"2–3"} min @ ${vo2pct}% FCmax + recuperación igual)`:String(vo2pct);
  const wod=WODS[(w.w-1)%WODS.length];
  if(t) return [
    {l:"Weighted Pull-ups · 1RM",yt:"Weighted Pull-ups",lines:[{t:"Target: +52 kg"}]},
    {l:"Weighted Dips · 1RM",lines:[{t:"Target: +52 kg"}]},
  ];
  return [
    {l:`${d5oly} · ${d?"Técnico":"Técnico-Pesado"}`,dur:"15'",yt:d5oly==="C&J"?"Clean & Jerk":"Snatch",lines:[
      {t:`${d?3:5}×(1+1) @ ${olyP}%`,kg:`~${olyK} kg`,rpe:d?"RPE 7":"RPE 7–8"},
      {t:"Descanso: 2 min"},
    ]},
    {l:"Bench Press · Fuerza",dur:"10'",yt:"Bench Press",lines:[
      {t:`Top Set: 1×3 @ ${bsP}%`,kg:`~${bsK} kg`,rpe:"RPE 8"},
      {t:`Back-off: ${d?1:2}×3 @ 88% del top`,kg:`~${Math.round(bsK*.88)} kg`},
      {t:"Tempo: 2-1-1-0 · 2:30 min",tmp:"2-1-1-0"},
    ],note:"DUP: Martes = velocidad explosiva. Viernes = fuerza máxima. Mismo músculo, señales distintas."},
    vo2r>0?{l:"Intervalos VO2 Max",dur:"16'",lines:[
      {t:vo2t},
      {t:"Remo preferido · Ski Erg o Bike · ~14–18 min total"},
    ],note:"Reducido de la v1: menos rounds, más intensidad por round. Si no llegas al % objetivo en los primeros 30s, sube la resistencia."}:{l:"Cardiovascular Deload",lines:[{t:String(vo2pct)}]},
    ...(!d?[{l:`WOD · ${wod.name}`,dur:"18'",cls:"wod",badge:"WOD",
      lines:[{t:wod.fmt},{t:wod.desc}],
      note:wod.note}]:[]),
  ];
}

function getD6Blocks(w){
  const fl=FREELETICS[(w.w-1)%FREELETICS.length];
  return [
    {l:"Calentamiento · 5 min",lines:[{t:"3 min: Jumping Jacks + High Knees + Arm Circles"},{t:"2 min: 10 Hip Circles + 10 Leg Swings + 5 Inchworms"}]},
    {l:`${fl.name} · ${fl.fmt}`,cls:"wod",badge:"FREELETICS",lines:[{t:fl.desc}],note:fl.note},
    {l:"Cool Down · 5 min",lines:[{t:"Pigeon Pose 1 min/lado · Standing Quad 30s/lado · Forward Fold 2 min"}]},
  ];
}

function getBlocks(w,dn){
  if(dn===1) return getD1Blocks(w);
  if(dn===2) return getD2Blocks(w);
  if(dn===3) return getD3Blocks(w);
  if(dn===4) return getD4Blocks(w);
  if(dn===5) return getD5Blocks(w);
  if(dn===6) return getD6Blocks(w);
  return [];
}

function getDur(w,dn){
  const d=w.dl;
  if(dn===3) return d?"30 min":"45–60 min";
  if(dn===6) return "30 min";
  return d?"60 min":"75 min";
}

function getDayTitle(w,dn){
  const wd=WD[w.w-1],isBack=w.w%2===1;
  const d1oly=isBack?"C&J":"Snatch",d5oly=isBack?"Snatch":"C&J";
  const sm=STRONGMAN[w.w-1],wod=WODS[(w.w-1)%WODS.length];
  if(w.ts) return ["BS+FS+Snatch · 1RM","Bench+Press · 1RM","Carrera suave","DL+PRow+C&J · 1RM","W.Pull-ups+Dips · 1RM","Freeletics Opcional"][dn-1];
  return [
    `${isBack?"Back Squat":"Front Squat"} + ${d1oly} + GPP`,
    "Bench + Press + BB Finisher",
    "Carrera Z2",
    `DL + Pendlay Row + ${sm.name.split(":")[1]?.trim()||"Strongman"}`,
    `${d5oly} + Bench + VO2 + WOD`,
    "Freeletics · Bodyweight",
  ][dn-1];
}

// Timing blocks per session for the visual bar
function getTimingBlocks(w,dn){
  const d=w.dl,run=WD[w.w-1][9],z2=WD[w.w-1][8];
  const times={
    1:d?[["Calent","5'","#333"],["Squat","10'","#4dabf7"],["Oly","10'","#ff6b35"],["HSPU","8'","#cc5de8"]]
         :[["Calent","8'","#333"],["Squat","20'","#4dabf7"],["Oly","15'","#ff6b35"],["HSPU","10'","#cc5de8"],["GPP","10'","#51cf66"]],
    2:d?[["Z2",`${z2}'`,"#51cf66"],["Bench","10'","#ff6b35"],["Press","8'","#4dabf7"],["Dips","7'","#cc5de8"]]
         :[["Z2",`${z2}'`,"#51cf66"],["Bench","10'","#ff6b35"],["Press","8'","#4dabf7"],["Dips","7'","#cc5de8"],["BB","10'","#ffd43b"]],
    3:[["Activación","5'","#333"],["Carrera Z2",`${run}'`,"#51cf66"],["Cool down","5'","#333"]],
    4:d?[["Calent","5'","#333"],["DL","15'","#4dabf7"],["PRow","10'","#ff6b35"],["Pull-ups","8'","#cc5de8"]]
          :[["Calent","5'","#333"],["DL","18'","#4dabf7"],["PRow","12'","#ff6b35"],["Pull-ups","10'","#cc5de8"],["Strongman","20'","#ffd43b"]],
    5:d?[["Oly","12'","#ff6b35"],["Bench","10'","#4dabf7"],["VO2","15'","#51cf66"]]
          :[["Oly","15'","#ff6b35"],["Bench","10'","#4dabf7"],["VO2","16'","#51cf66"],["WOD","18'","#b8ff35"]],
    6:[["Calent","5'","#333"],["Freeletics","20'","#ff6b6b"],["Cool","5'","#333"]],
  };
  return times[dn]||[];
}

const DAYS=[
  {n:"Lunes",type:"Fuerza + GPP",col:"#4dabf7",opt:false},
  {n:"Martes",type:"Potencia + Z2 + BB",col:"#ff6b35",opt:false},
  {n:"Miércoles",type:"Carrera Z2",col:"#51cf66",opt:false},
  {n:"Jueves",type:"Hipertrofia + Strongman",col:"#cc5de8",opt:false},
  {n:"Viernes",type:"Integración + VO2 + WOD",col:"#b8ff35",opt:false},
  {n:"Sábado",type:"Freeletics (Opcional)",col:"#ff6b6b",opt:true},
];

function renderHome(){
  let h='',lp=0;
  WEEKS.forEach(w=>{
    const col=PC(w.p);
    if(w.p!==lp){
      lp=w.p;
      h+=`<div style="font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:${col};padding:14px 4px 6px;font-family:monospace;margin:0 12px">${w.pn}</div>`;
    }
    // Intensity dots — exactly like React: width:14px,height:3px,borderRadius:2px

      <div style="font-size:22px;font-weight:800;color:${col};width:36px;flex-shrink:0;line-height:1">W${w.w}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;color:#585858;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${w.focus}</div>
        <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">
          ${bdg}
          <div style="display:flex;gap:2px">${dots}</div>

  // Intensity dots — large version for week hero (width:22px like React)
  const dots=[1,2,3,4,5].map(i=>
    `<div style="width:22px;height:3px;border-radius:2px;background:${i<=curW.int?'#c8f135':'#252525'}"></div>`
  ).join('');
  const bdg=(curW.dl?`<span style="font-size:9px;background:rgba(77,171,247,0.15);color:#4dabf7;padding:2px 8px;border-radius:8px;font-weight:700">DELOAD</span>`:'')
    +(curW.ts?`<span style="font-size:9px;background:rgba(184,255,53,0.2);color:#c8f135;padding:2px 8px;border-radius:8px;font-weight:700">⭐ TESTING</span>`:'');

  document.getElementById('week-hero').style.cssText='padding:14px;border-bottom:1px solid #232323;flex-shrink:0;background:'+col+'08';

  DAYS.forEach((d,i)=>{

    const border=d.opt?'border:1px dashed #2e2e2e;background:transparent':'background:#111';
    h+=`<div onclick="openDay(${dn})" style="${border};margin:0 12px 7px;border-radius:12px;padding:13px 15px;cursor:pointer;-webkit-tap-highlight-color:transparent" ontouchstart="this.style.opacity=0.65" ontouchend="this.style.opacity=1">

        <div style="font-size:11px;color:#585858">${dur}</div>
      </div>
      <div style="font-size:12px;color:#585858;margin-bottom:6px">${title}</div>

  document.getElementById('fab').classList.remove('on');

}

function goHome(){show('home');document.getElementById('fab').classList.remove('on');}
function goWeek(){show('week-view');document.getElementById('fab').classList.remove('on');}

function openDay(dn){
  curDN=dn;
  const d=DAYS[dn-1],col=d.col;
  const title=getDayTitle(curW,dn),dur=getDur(curW,dn);
  const timing=getTimingBlocks(curW,dn);
  const timingHtml=timing.map(([n,t,c])=>`<div class="tblock" style="background:${c}22;color:${c}">${n} ${t}</div>`).join('');
  const pcol=PC(curW.p);
  document.getElementById('sess-tb').textContent=`S${curW.w} · ${d.n}`;
  document.getElementById('sess-hero').style.cssText=`padding:14px;border-bottom:1px solid #232323;flex-shrink:0;background:${col}08`;
  document.getElementById('sess-hero').innerHTML=`
    <div style="font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:${col};font-family:monospace;margin-bottom:4px">${d.type}</div>
    <div style="font-size:18px;font-weight:700;line-height:1.2;margin-bottom:8px">${title}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      <span style="font-size:10px;color:#585858;background:#181818;padding:3px 9px;border-radius:8px">${dur}</span>
      <span style="font-size:10px;color:${pcol};background:${pcol}18;padding:3px 9px;border-radius:8px">${curW.pn}</span>
      ${d.opt?'<span style="font-size:10px;color:#ff6b6b;background:rgba(255,107,107,0.15);padding:3px 9px;border-radius:8px">OPCIONAL</span>':''}
    </div>
    <div style="display:flex;gap:3px;flex-wrap:wrap">${timingHtml}</div>`;

  const blocks=getBlocks(curW,dn);
  let h='';
  blocks.forEach(b=>{
    if(!b) return;
    const cls=b.cls||'';
    const bdrMap={bb:'border:1px solid rgba(255,107,53,.2)',sm:'border:1px solid rgba(255,212,59,.2)',wod:'border:1px solid rgba(184,255,53,.25)',gpp:'border:1px solid rgba(77,171,247,.2)'};
    const bStyle=bdrMap[cls]||'';
    const bdgMap={bb:'background:rgba(255,107,53,.2);color:#ff6b35',sm:'background:rgba(255,212,59,.2);color:#ffd43b',wod:'background:rgba(184,255,53,.2);color:#c8f135',gpp:'background:rgba(77,171,247,.2);color:#4dabf7'};
    const bdgHtml=b.badge?`<span class="blk-badge" style="${bdgMap[cls]||''}">${b.badge}</span>`:'';
    const durHtml=b.dur?`<span class="blk-dur">${b.dur}</span>`:'';
    h+=`<div class="blk" style="${bStyle}"><div class="blk-l"><div class="blk-ltext">${b.l}${bdgHtml}</div>${durHtml}</div><div class="blk-lines">`;
    b.lines.forEach(l=>{
      h+=`<div class="lrow">${l.t}`;
      if(l.kg||l.rpe||l.tmp){h+=`<div class="ltags">`;
        if(l.kg) h+=`<span class="ltag kg">${l.kg}</span>`;
        if(l.rpe) h+=`<span class="ltag rpe">${l.rpe}</span>`;
        if(l.tmp) h+=`<span class="ltag tmp">${l.tmp}</span>`;
        h+=`</div>`;}
      h+=`</div>`;
    });
    h+=`</div>`;
    if(b.yt&&YT[b.yt]) h+=`<div class="yt-row"><a class="yt-link" href="${YT[b.yt]}" target="_blank">▶ Ver técnica en YouTube</a></div>`;
    if(b.note) h+=`<div class="blk-note">${b.note}</div>`;
    h+=`</div>`;
  });

  if(dn<=5){
    const mob=MOB[`D${dn}`];
    if(mob){
      const mid=`mob${dn}`;
      h+=`<div class="mob"><div class="mob-hdr" onclick="toggleMob('${mid}')">
        <div><div class="mob-htitle">Movilidad · ${mob.dur} · ${mob.title}</div><div class="mob-focus">${mob.focus}</div></div>
        <div class="mob-arr" id="${mid}arr">›</div>
      </div><div class="mob-body" id="${mid}">`;
      mob.ex.forEach(([n,dur,t,yt])=>{
        h+=`<div class="mob-ex"><div class="mob-ex-hdr">
          <div class="mob-ex-l"><div class="mob-ex-d">${dur}</div><div class="mob-ex-n">${n}</div></div>
          <div class="mob-ex-t">${t}</div>
        </div>`;
        if(yt) h+=`<a class="yt-link" href="${yt}" target="_blank" style="margin-left:86px">▶ Ver en YouTube</a>`;
        h+=`</div>`;
      });
      h+=`<div class="mob-foot">Pliability / GoWod / The Ready State · Respira hacia cada zona de restricción</div></div></div>`;
    }
  }

  document.getElementById('sess-content').innerHTML=h;
  document.querySelector('#sess-view .scroll').scrollTop=0;
  document.getElementById('fab').classList.add('on');
  show('sess-view');
}

function toggleMob(id){
  document.getElementById(id).classList.toggle('on');
  document.getElementById(id+'arr').classList.toggle('open');
}

function openExport(){
  if(!curW||!curDN) return;
  const d=DAYS[curDN-1],title=getDayTitle(curW,curDN),blocks=getBlocks(curW,curDN);
  const mob=MOB[`D${curDN}`];
  const lines=[
    `=== REBUILD STRONG v6 — S${curW.w} ${d.n.toUpperCase()} ===`,
    title,`${curW.pn} | ${d.type} | ${getDur(curW,curDN)}`,'',
    ...blocks.filter(Boolean).flatMap(b=>[`--- ${b.l} ---`,
      ...b.lines.map(l=>{let r=l.t;if(l.kg)r+=` (${l.kg})`;if(l.rpe)r+=` [${l.rpe}]`;if(l.tmp)r+=` tempo:${l.tmp}`;return r;}),
      b.note?`* ${b.note}`:'','']),
    '=== BTWB QUICK LOG ===',
    ...blocks.filter(Boolean).map(b=>`${b.l}: ${b.lines[0]?.t||''} ${b.lines[0]?.kg||''}`),
    '','=== MOVILIDAD ===',
    ...(mob?.ex.map(([n,dur])=>`${dur} — ${n}`)||[])
  ].join('\n');
  document.getElementById('exp-sub').textContent=`S${curW.w} · ${d.n}`;
  document.getElementById('exp-txt').textContent=lines;
  document.getElementById('btn-copy').textContent='Copiar para BTWB';
  document.getElementById('btn-copy').classList.remove('done');
  document.getElementById('overlay').classList.add('on');
}

function closeExport(){document.getElementById('overlay').classList.remove('on');}
function overlayTap(e){if(e.target===document.getElementById('overlay'))closeExport();}
function doCopy(){
  const t=document.getElementById('exp-txt').textContent,btn=document.getElementById('btn-copy');
  navigator.clipboard?.writeText(t).catch(()=>{});
  btn.textContent='✓ ¡Copiado!';btn.classList.add('done');
  setTimeout(closeExport,1400);
}
function show(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));document.getElementById(id).classList.add('on');}

if('serviceWorker' in navigator){
  const sw=`self.addEventListener('install',e=>{e.waitUntil(caches.open('rs-v6').then(c=>c.add('/')))});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}
renderHome();
</script>

</div><!-- /app-shell -->
