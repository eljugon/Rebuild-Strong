<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PROG 16W">
<meta name="theme-color" content="#0d0d0d">
<title>Programa 16 Semanas v5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;--bg4:#242424;
  --text:#f0f0f0;--muted:#888;--muted2:#555;--accent:#c8f135;
  --c1:#4dabf7;--c2:#51cf66;--c3:#ff6b35;--c4:#c8f135;--csat:#94d82d;
  --font-h:'Barlow Condensed',sans-serif;
  --font-n:'JetBrains Mono',monospace;
  --sat:env(safe-area-inset-top,20px);
  --sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);
  --sar:env(safe-area-inset-right,0px);
  --topbar-content-h:48px;
  --topbar-h:calc(var(--topbar-content-h) + var(--sat));
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg);-webkit-text-size-adjust:100%}
body{font-family:var(--font-h);letter-spacing:.01em;background:var(--bg);color:var(--text);
  min-height:100vh;overscroll-behavior-y:none}

.topbar{position:fixed;top:0;left:0;right:0;z-index:1000;
  padding-top:var(--sat);padding-left:calc(12px + var(--sal));padding-right:calc(12px + var(--sar));
  background:rgba(13,13,13,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bg4)}
.topbar-inner{height:var(--topbar-content-h);display:flex;align-items:center;gap:10px}
.topbar-back{background:var(--accent);color:#000;border:none;
  font-family:var(--font-n);font-size:12px;font-weight:700;
  cursor:pointer;padding:8px 14px;border-radius:4px;letter-spacing:.05em;flex-shrink:0;
  -webkit-user-select:none;user-select:none;display:flex;align-items:center;gap:4px;min-height:36px}
.topbar-back:active{transform:scale(.96);opacity:.85}
.topbar-title{font-size:14px;font-weight:700;letter-spacing:.04em;color:var(--text);flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.topbar-sub{font-family:var(--font-n);font-size:10px;color:var(--muted);
  text-align:right;white-space:nowrap;flex-shrink:0;max-width:90px;overflow:hidden;text-overflow:ellipsis}
.topbar-spacer{height:var(--topbar-h)}

.home-header{padding:24px 20px;border-bottom:1px solid var(--bg4)}
.home-header h1{font-size:64px;font-weight:900;letter-spacing:-.03em;line-height:.9;
  color:var(--accent);margin-bottom:8px}
.home-header h1 sup{font-size:18px;color:var(--c2);font-weight:700;letter-spacing:0;margin-left:4px}
.home-header p{font-size:17px;color:var(--muted);font-weight:700;letter-spacing:.1em}
.athlete-meta{margin-top:18px;display:flex;gap:6px;flex-wrap:wrap}
.badge{font-family:var(--font-n);font-size:10px;background:var(--bg3);
  border:1px solid var(--bg4);padding:4px 9px;border-radius:3px;color:var(--muted)}
.badge.hi{border-color:var(--accent);color:var(--accent)}

.summary-bar{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;
  background:var(--bg4);margin:0 0 1px 0;border-bottom:1px solid var(--bg4)}
.summary-cell{background:var(--bg2);padding:10px 14px;font-size:11px;line-height:1.5}
.summary-cell strong{color:var(--accent);font-family:var(--font-n);font-size:10px;
  letter-spacing:.06em;display:block;margin-bottom:2px}

.phase-legend{display:flex;gap:6px;padding:14px 20px;overflow-x:auto;
  scrollbar-width:none;border-bottom:1px solid var(--bg4)}
.phase-legend::-webkit-scrollbar{display:none}
.phase-pill{flex-shrink:0;font-size:10px;font-weight:700;letter-spacing:.06em;
  padding:5px 10px;border-radius:2px;background:rgba(255,255,255,.04);border-left:3px solid;line-height:1.4}
.phase-pill div:last-child{font-weight:400;opacity:.65;font-size:9px}

.week-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bg4);margin:1px}
.week-card{background:var(--bg2);padding:14px 10px;cursor:pointer;
  display:flex;flex-direction:column;gap:3px;border-top:3px solid transparent;
  transition:background .12s;min-height:90px;-webkit-user-select:none;user-select:none}
.week-card:active{background:var(--bg3)}
.wk-num{font-family:var(--font-n);font-size:22px;font-weight:700;line-height:1}
.wk-phase{font-size:9px;letter-spacing:.06em;color:var(--muted)}
.wk-dots{display:flex;gap:3px;margin-top:6px}
.wk-dot{width:5px;height:5px;border-radius:50%}

.week-hero{padding:20px 20px 18px;border-bottom:1px solid var(--bg4)}
.week-hero-num{font-size:72px;font-weight:900;line-height:.95;letter-spacing:-.03em}
.week-hero-meta{font-size:12px;color:var(--muted);letter-spacing:.04em;margin-top:2px}
.phase-tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.08em;
  border:1px solid;padding:3px 9px;border-radius:2px;margin-top:10px}

.session-list{padding:8px 10px 24px}
.session-card{background:var(--bg2);border:1px solid var(--bg4);border-radius:4px;
  margin-bottom:6px;cursor:pointer;overflow:hidden;
  -webkit-user-select:none;user-select:none;transition:.12s}
.session-card:active{border-color:var(--accent);background:var(--bg3)}
.session-card.optional{opacity:.85;border-style:dashed}
.session-card.cardio{background:linear-gradient(90deg,rgba(77,171,247,.04),var(--bg2) 60%)}
.sc-inner{display:flex;align-items:stretch;min-height:64px}
.sc-day{font-family:var(--font-n);font-size:10px;font-weight:700;
  padding:14px 12px;background:var(--bg3);letter-spacing:.08em;
  writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);
  min-width:36px;text-align:center;border-right:1px solid var(--bg4);flex-shrink:0;
  display:flex;align-items:center;justify-content:center}
.sc-info{padding:12px 14px;flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.sc-type{font-size:10px;color:var(--muted);letter-spacing:.05em;margin-bottom:3px}
.sc-title{font-size:16px;font-weight:700;line-height:1.2}
.sc-meta{font-size:11px;color:var(--muted);margin-top:4px;font-family:var(--font-n);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-arrow{font-size:20px;color:var(--muted2);padding:0 12px;display:flex;align-items:center;flex-shrink:0}

.opt-badge{display:inline-block;font-family:var(--font-n);font-size:9px;
  background:var(--csat);color:#000;padding:2px 6px;border-radius:2px;margin-right:6px;font-weight:700}
.cardio-badge{display:inline-block;font-family:var(--font-n);font-size:9px;
  background:var(--c1);color:#000;padding:2px 6px;border-radius:2px;margin-right:6px;font-weight:700}

.session-hero{padding:20px 20px 18px;border-bottom:3px solid var(--accent)}
.s-day{font-family:var(--font-n);font-size:10px;letter-spacing:.1em;color:var(--muted);margin-bottom:4px}
.s-title{font-size:34px;font-weight:900;letter-spacing:-.01em;line-height:1.05}
.s-subtitle{font-size:14px;font-weight:600;color:var(--muted);margin-top:6px}
.s-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.s-badge{font-family:var(--font-n);font-size:10px;border:1px solid var(--bg4);
  background:var(--bg3);padding:4px 9px;border-radius:2px}
.s-badge.ac{border-color:var(--accent);color:var(--accent)}
.s-badge.opt{background:var(--csat);color:#000;border-color:var(--csat);font-weight:700}

.note-extra{background:var(--bg3);border-left:3px solid var(--accent);
  padding:10px 14px;margin:12px 16px;border-radius:3px;font-size:12px;color:var(--muted)}

.section{padding:14px 18px;border-bottom:1px solid var(--bg4)}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--muted);
  margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--bg4)}
.wu-item{font-size:13px;padding-left:16px;position:relative;color:var(--muted);
  line-height:1.5;margin-bottom:5px}
.wu-item::before{content:'→';position:absolute;left:0;color:var(--muted2);font-family:var(--font-n)}

.blocks-wrap{padding:8px 10px 4px}
.block{background:var(--bg2);border:1px solid var(--bg4);border-radius:4px;
  margin-bottom:6px;overflow:hidden}
.block-head{padding:12px 14px;border-bottom:1px solid var(--bg4);
  display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.b-type{font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--muted);margin-bottom:4px}
.b-name{font-size:17px;font-weight:700;line-height:1.2}
.b-load{text-align:right;flex-shrink:0}
.b-kg{font-family:var(--font-n);font-size:19px;font-weight:700;color:var(--accent);line-height:1}
.b-pct{font-family:var(--font-n);font-size:10px;color:var(--muted);margin-top:2px}
.block-body{padding:10px 14px;display:flex;flex-direction:column;gap:7px}
.b-row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.b-rl{font-size:12px;color:var(--muted)}
.b-rv{font-family:var(--font-n);font-size:12px;font-weight:700;text-align:right}
.rpe-bar{height:3px;background:var(--bg4);border-radius:2px;margin-top:2px}
.rpe-fill{height:100%;border-radius:2px;transition:width .3s}
.b-note{font-size:13px;color:var(--muted);line-height:1.55;background:var(--bg3);
  padding:9px 11px;border-radius:3px;border-left:2px solid var(--bg4);white-space:pre-wrap}
.b-bo{font-family:var(--font-n);font-size:11px;background:var(--bg);padding:7px 11px;
  border-radius:3px;color:var(--muted);border:1px dashed var(--bg4)}
.b-bo::before{content:'↳ Back-off: ';color:var(--muted2)}
.b-video{display:inline-flex;align-items:center;gap:5px;
  background:var(--bg);border:1px solid var(--bg4);border-radius:3px;
  padding:8px 12px;color:var(--c1);font-family:var(--font-n);font-size:11px;
  text-decoration:none;font-weight:700;letter-spacing:.04em;align-self:flex-start}
.b-video::before{content:'▶'}
.b-video:active{background:var(--bg4);color:var(--accent)}

.accordion{border-top:1px solid var(--bg4)}
.acc-btn{width:100%;background:none;border:none;padding:14px 18px;
  display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;color:var(--text);font-family:var(--font-h);
  -webkit-user-select:none;user-select:none}
.acc-btn:active{background:var(--bg3)}
.acc-lbl{font-size:14px;font-weight:700;letter-spacing:.04em}
.acc-meta{font-size:11px;color:var(--muted);margin-top:2px;text-align:left}
.acc-icon{font-family:var(--font-n);font-size:20px;color:var(--muted2);
  transition:transform .22s;flex-shrink:0}
.acc-icon.open{transform:rotate(45deg)}
.acc-body{display:none;padding:0 18px 18px}
.acc-body.open{display:block}

.mob-ex{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--bg4)}
.mob-ex:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.mob-ex-hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;gap:8px}
.mob-ex-nm{font-size:14px;font-weight:700}
.mob-ex-dur{font-family:var(--font-n);font-size:10px;color:var(--accent);flex-shrink:0}
.mob-ex-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:6px}
.mob-ex-video{display:inline-flex;align-items:center;gap:4px;font-size:10px;
  color:var(--c1);text-decoration:none;font-family:var(--font-n);font-weight:700}
.mob-ex-video::before{content:'▶'}

.btwb-text{font-family:var(--font-n);font-size:11px;background:var(--bg);
  padding:12px;border-radius:3px;white-space:pre-wrap;line-height:1.7;
  color:var(--text);border:1px solid var(--bg4)}
.copy-btn{width:100%;margin-top:10px;background:var(--accent);color:#000;
  border:none;border-radius:3px;padding:12px;font-family:var(--font-h);
  font-size:15px;font-weight:700;letter-spacing:.04em;cursor:pointer}
.copy-btn:active{opacity:.8;transform:scale(.98)}
.copy-btn.done{background:var(--c2)}
.bot{height:calc(40px + var(--sab))}

@media(max-width:380px){
  .topbar-title{font-size:12px}
  .s-title{font-size:28px}
  .b-name{font-size:15px}
}
</style>
</head>

n", "vid": "https://www.youtube.com/results?search_query=Rower%20VO2%20max%20intervals%20technique"}], "mobility": {"title": "Post-Olympic + Front Squat + Core", "dur": "8 min", "ex": [["Front Rack Stretch", "60 seg/lado", "Codo arriba, libera muñeca y dorsal.", "https://www.youtube.com/results?search_query=front%20rack%20mobility%20technique"], ["Overhead Squat Hold", "90 seg", "Palo sobre cabeza. Squat profundo.", "https://www.youtube.com/results?search_query=overhead%20squat%20hold%20technique"], ["Couch Stretch", "60 seg/lado", "Pie trasero contra pared.", "https://www.youtube.com/results?search_query=couch%20stretch%20technique"]]}, "btwb": "S16/VIE — D5 OLY + FS + SP + LEG + CORE + VO2 + BB — Fase 4\n  Squat Clean + Split Jerk: 3×(1+1) @ 80.0/80.0 kg\n  Front Squat: 3×3 @ 100.0 kg\n  Strict Press: 3×4 @ 55.0 kg\n  Leg Curl tumbado: 3×12 @ 30-40 kg\n  Hollow Hold + V-ups: 4 rondas\n  Sissy Squat Drop: 3×12 + drop\n  VO2 Max — Rower: 3 × 3 min / 2 min rest\n  Pesos / distancias / split: ___"}, {"day": "SÁB", "day_full": "Sábado", "type": "D6 (opc) · Pyramid + Core Finisher", "color": "#94d82d", "phase": 4, "phase_name": "Peak & Realización", "week": 16, "duration": "30 min", "warmup": ["2 min jumping jacks + arm circles", "10 air squats + 10 push-ups + 10 hollow rocks"], "blocks": [{"n": "Pyramid + Core Finisher", "t": "Bodyweight Freeletics-style (con core integrado)", "sch": "22 min", "kg": "BW", "pct": "", "rpe": "8", "bo": [], "note": "Pyramid 5-10-15-20-15-10-5:\n• Push-ups\n• Air Squats\n• Sit-ups\nLuego: 3 rounds 30s hollow + 30s plank\n\n💡 Cap 22 min.\n\n✅ Core integrado como parte del WOD.", "tempo": "", "rest": "—", "vid": "https://www.youtube.com/results?search_query=pyramid%20bodyweight%20workout%20technique"}], "mobility": {"title": "Post-Bodyweight — Express", "dur": "5 min", "ex": [["Child's Pose", "60 seg", "Respira profundo.", "https://www.youtube.com/results?search_query=child%20pose%20technique"], ["Cobra Stretch", "60 seg", "Compensa hollow holds.", "https://www.youtube.com/results?search_query=cobra%20stretch%20technique"], ["Standing Forward Fold", "60 seg", "Cuelga desde caderas.", "https://www.youtube.com/results?search_query=forward%20fold%20stretch%20technique"], ["Standing Quad Stretch", "60 seg/lado", "Talón al glúteo.", "https://www.youtube.com/results?search_query=standing%20quad%20stretch%20technique"]]}, "btwb": "S16/SÁB (opc) — D6 BODYWEIGHT — Pyramid + Core Finisher\n  Resultado: ___", "optional": true}]}];
const DAY_COL=['#4dabf7','#51cf66','#94d82d','#ff6b35','#c8f135','#94d82d'];
const DAY_ICON=['💪','🔥','🏃','📈','🦬','🤸'];

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function nl2br(s){return esc(s).replace(/\n/g,'<br>')}

function route(){
  const h=location.hash||'#home';
  const p=h.slice(1).split('/');
  const app=document.getElementById('app');
  if(!h||h==='#home'){app.innerHTML=renderHome();bindHome();window.scrollTo(0,0);return}
  if(p[0]==='week'){app.innerHTML=renderWeek(+p[1]);bindWeek();window.scrollTo(0,0);return}
  if(p[0]==='session'){app.innerHTML=renderSession(+p[1],+p[2]);window.scrollTo(0,0);return}
  app.innerHTML=renderHome();bindHome();window.scrollTo(0,0);
}
window.addEventListener('hashchange',route);

function renderHome(){
  const phases=[
    {n:'F1',s:'S1–4',name:'Acumulación Base',c:'#4dabf7'},
    {n:'F2',s:'S5–8',name:'Acumulación Pesada',c:'#51cf66'},
    {n:'F3',s:'S9–12',name:'Intensificación',c:'#ff6b35'},
    {n:'F4',s:'S13–16',name:'Peak & Realización',c:'#c8f135'},
  ];
  const legend=phases.map(p=>`<div class="phase-pill" style="border-color:${p.c};color:${p.c}">
    <div>${p.n} · ${p.s}</div><div>${p.name}</div></div>`).join('');
  const grid=PROGRAM.map(wk=>{
    const dots=DAY_COL.map(c=>`<div class="wk-dot" style="background:${c}"></div>`).join('');
    return `<div class="week-card" data-w="${wk.week}" style="border-top-color:${wk.phase_color}">
      <div class="wk-num" style="color:${wk.phase_color}">${wk.week}</div>
      <div class="wk-phase">${wk.phase_name.toUpperCase().slice(0,11)}</div>
      <div class="wk-dots">${dots}</div></div>`;
  }).join('');
  return `<div class="home-header">
    <h1>16W<sup>v8.1</sup></h1>
    <p>PROGRAMA DE ENTRENAMIENTO</p>
    <div class="athlete-meta">
      <span class="badge hi">4 días pesas + Z2 run + opc BW</span>
      <span class="badge">193 cm · 92.3 kg</span>
      <span class="badge">BS 145 · DL 175 · PC 125</span>
    </div>
  </div>
  <div class="summary-bar">
    <div class="summary-cell"><strong>LUN</strong>Fuerza + BB</div>
    <div class="summary-cell"><strong>MAR</strong>Potencia + WOD</div>
    <div class="summary-cell"><strong>MIÉ</strong>Z2 Run</div>
    <div class="summary-cell"><strong>JUE</strong>Hipertrofia + Arms + Lácticos</div>
    <div class="summary-cell"><strong>VIE</strong>Hinge + Strongman + VO2</div>
    <div class="summary-cell"><strong>SÁB</strong>Opcional bodyweight</div>
  </div>
  <div class="phase-legend">${legend}</div>
  <div class="week-grid">${grid}</div>
  <div class="bot"></div>`;
}
function bindHome(){
  document.querySelectorAll('.week-card').forEach(el=>
    el.addEventListener('click',()=>location.hash='#week/'+el.dataset.w));
}

function renderWeek(w){
  const wk=PROGRAM[w-1];const pc=wk.phase_color;
  const cards=wk.sessions.map((s,i)=>{
    const optTag=s.optional?`<span class="opt-badge">OPC</span>`:'';
    const cardioTag=(i===2)?`<span class="cardio-badge">CARDIO</span>`:'';
    const firstBlock=s.blocks[0];
    const meta=firstBlock.kg && firstBlock.kg.length<25 ? `${esc(firstBlock.n).split(' (')[0]} ${esc(firstBlock.kg)}` : esc(firstBlock.n).split(' (')[0];
    const cardioClass=(i===2)?' cardio':'';
    return `<div class="session-card${s.optional?' optional':''}${cardioClass}" data-w="${w}" data-d="${i}">
      <div class="sc-inner">
        <div class="sc-day" style="color:${s.color}">${s.day}</div>
        <div class="sc-info">
          <div class="sc-type">${DAY_ICON[i]} ${esc(s.type)}</div>
          <div class="sc-title">${cardioTag}${optTag}${esc(s.day_full)}</div>
          <div class="sc-meta">${meta} · ${esc(s.duration)}</div>
        </div>
        <div class="sc-arrow">›</div>
      </div></div>`;
  }).join('');
  return `<div class="topbar"><div class="topbar-inner">
    <button class="topbar-back" onclick="location.hash='#home'">← INICIO</button>
    <div class="topbar-title">SEMANA ${w}</div>
    <div class="topbar-sub" style="color:${pc}">${esc(wk.phase_name)}</div>
  </div></div>
  <div class="topbar-spacer"></div>
  <div class="week-hero" style="border-bottom-color:${pc}">
    <div class="week-hero-num" style="color:${pc}">S${w}</div>
    <div class="week-hero-meta">4 días pesas · Z2 run · opcional bodyweight</div>
    <div class="phase-tag" style="border-color:${pc};color:${pc}">FASE ${wk.phase} · ${wk.phase_name.toUpperCase()}</div>
  </div>
  <div class="session-list">${cards}</div>
  <div class="bot"></div>`;
}
function bindWeek(){
  document.querySelectorAll('.session-card').forEach(el=>
    el.addEventListener('click',()=>location.hash=`#session/${el.dataset.w}/${el.dataset.d}`));
}

function rpeColor(rpe){
  const r=parseFloat(rpe)||0;
  return r>=9?'#ff6b35':r>=8?'#ffa500':r>=7?'#c8f135':'#51cf66';
}
function renderSession(w,d){
  const s=PROGRAM[w-1].sessions[d];const pc=s.color;
  const wu=s.warmup.map(x=>`<div class="wu-item">${esc(x)}</div>`).join('');
  const blocks=s.blocks.map(b=>{
    const rpe=parseFloat(b.rpe)||0;
    const rc=rpeColor(b.rpe);
    const kgH=b.kg?`<div class="b-kg">${esc(b.kg)}</div><div class="b-pct">${esc(b.pct||'')}</div>`:'';
    const vidH=b.vid?`<a href="${esc(b.vid)}" target="_blank" rel="noopener" class="b-video">Ver vídeo en YouTube</a>`:'';
    return `<div class="block">
      <div class="block-head">
        <div style="min-width:0">
          <div class="b-type">${esc(b.t)}</div>
          <div class="b-name">${esc(b.n)}</div>
        </div>
        <div class="b-load">${kgH}</div>
      </div>
      <div class="block-body">
        <div class="b-row"><div class="b-rl">Series × Reps</div><div class="b-rv">${esc(b.sch)}</div></div>
        ${b.tempo?`<div class="b-row"><div class="b-rl">Tempo</div><div class="b-rv" style="color:var(--muted);font-size:11px">${esc(b.tempo)}</div></div>`:''}${b.rest && b.rest!=='—'?`<div class="b-row"><div class="b-rl">Descanso</div><div class="b-rv" style="color:var(--muted);font-size:11px">${esc(b.rest)}</div></div>`:''}
        ${rpe>0?`<div class="b-row"><div class="b-rl">RPE objetivo</div><div class="b-rv" style="color:${rc}">${esc(b.rpe)}</div></div>
        <div class="rpe-bar"><div class="rpe-fill" style="width:${Math.min(100,rpe*10)}%;background:${rc}"></div></div>`:''}
        ${(Array.isArray(b.bo)?b.bo:(b.bo?[b.bo]:[])).map(x=>`<div class="b-bo">${esc(x)}</div>`).join('')}
        ${b.note?`<div class="b-note">${nl2br(b.note)}</div>`:''}
        ${vidH}
      </div></div>`;
  }).join('');
  const noteExtra=s.note_extra?`<div class="note-extra" style="border-color:${pc}">${esc(s.note_extra)}</div>`:'';
  const mob=s.mobility;
  const mobEx=mob.ex.map(e=>{
    const [nm,dur,desc,vidu]=e;
    return `<div class="mob-ex">
      <div class="mob-ex-hd"><div class="mob-ex-nm">${esc(nm)}</div><div class="mob-ex-dur">${esc(dur)}</div></div>
      <div class="mob-ex-desc">${esc(desc)}</div>
      ${vidu?`<a href="${esc(vidu)}" target="_blank" rel="noopener" class="mob-ex-video">Ver vídeo</a>`:''}
    </div>`;
  }).join('');
  return `<div class="topbar"><div class="topbar-inner">
    <button class="topbar-back" onclick="location.hash='#week/${w}'">← S${w}</button>
    <div class="topbar-title" style="color:${pc}">${esc(s.day)} · ${esc(s.day_full).toUpperCase()}</div>
    <div class="topbar-sub">${esc(s.duration)}</div>
  </div></div>
  <div class="topbar-spacer"></div>
  <div class="session-hero" style="border-bottom-color:${pc}">
    <div class="s-day">SEMANA ${w} · FASE ${s.phase} · ${s.phase_name.toUpperCase()}</div>
    <div class="s-title" style="color:${pc}">${esc(s.day_full).toUpperCase()}</div>
    <div class="s-subtitle">${esc(s.type)}</div>
    <div class="s-meta">
      ${s.optional?`<span class="s-badge opt">OPCIONAL</span>`:''}
      <span class="s-badge ac">⏱ ${esc(s.duration)}</span>
      <span class="s-badge">Fase ${s.phase}</span>
      <span class="s-badge">${s.blocks.length} ${s.blocks.length===1?'bloque':'bloques'}</span>
    </div>
  </div>
  ${noteExtra}
  <div class="section">
    <div class="sec-lbl">CALENTAMIENTO</div>${wu}
  </div>
  <div class="blocks-wrap">
    <div class="sec-lbl" style="padding:10px 4px 8px">BLOQUES DE TRABAJO</div>${blocks}
  </div>
  <div class="accordion">
    <button class="acc-btn" onclick="toggleAcc(this)">
      <div><div class="acc-lbl">🧘 Movilidad Post-Sesión</div>
      <div class="acc-meta">${esc(mob.title)} · ${esc(mob.dur)}</div></div>
      <div class="acc-icon">+</div>
    </button>
    <div class="acc-body">${mobEx}</div>
  </div>
  <div class="accordion">
    <button class="acc-btn" onclick="toggleAcc(this)">
      <div><div class="acc-lbl">📋 Exportar a BTWB</div>
      <div class="acc-meta">Texto formateado para copiar</div></div>
      <div class="acc-icon">+</div>
    </button>
    <div class="acc-body">
      <div class="btwb-text" id="btwb-t">${esc(s.btwb)}</div>
      <button class="copy-btn" onclick="doCopy(this)">COPIAR TEXTO</button>
    </div>
  </div>
  <div class="bot"></div>`;
}

function toggleAcc(btn){
  const body=btn.nextElementSibling;
  const icon=btn.querySelector('.acc-icon');
  const o=body.classList.toggle('open');
  icon.classList.toggle('open',o);
}
function doCopy(btn){
  const txt=document.getElementById('btwb-t').textContent;
  const fallback=()=>{const t=document.createElement('textarea');t.value=txt;
    document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t)};
  (navigator.clipboard?navigator.clipboard.writeText(txt).catch(fallback):Promise.resolve(fallback()))
    .finally(()=>{btn.textContent='✓ COPIADO';btn.classList.add('done');
    setTimeout(()=>{btn.textContent='COPIAR TEXTO';btn.classList.remove('done')},2200)});
}

route();
if('serviceWorker' in navigator){
  const sw=`const C='p16w-v8-1';
self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.add('/'))));
self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/')))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})),{scope:'/'}).catch(()=>{});
}
</script>
</body>
</html>
